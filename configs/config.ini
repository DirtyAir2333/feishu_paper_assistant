[SELECTION]
author_match_score = 15.0
run_openai = true
# DeepSeek models: deepseek-chat (fast), deepseek-reasoner (reasoning/thinking mode)
# 论文筛选评分使用 deepseek-reasoner 以获得更好的推理质量
model = deepseek-reasoner
# cost quality tradeoff - larger batches are cheaper but less accurate.
batch_size = 5

[FILTERING]
#arxiv_category = cs.CL,cs.LG,cs.AI
arxiv_category = cs.CV,cs.RO
# force_primary ignores papers that are only cross-listed into the arxiv_category
force_primary = false
# draws num_samples samples from the LM and averages scores
num_samples = 1
hcutoff = 15
relevance_cutoff = 1
novelty_cutoff = 1
# whether to do author matching
author_match = true

[OUTPUT]
debug_messages = true
dump_debug_file = true
output_path = out/
# options: json, md, slack
dump_json = true
dump_md = true
push_to_slack = true