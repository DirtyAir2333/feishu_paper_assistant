name: ArXiv Daily Paper Filter

on:
  schedule:
    # 北京时间上午 9:30 = UTC 1:30
    - cron: '30 1 * * *'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  filter-papers:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python 3.10
      uses: actions/setup-python@v5
      with:
        python-version: "3.10"

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Create output directory
      run: mkdir -p out

    - name: Run paper filter
      env:
        KIMI_KEY: ${{ secrets.KIMI_KEY }}
        DEEPSEEK_KEY: ${{ secrets.DEEPSEEK_KEY }}
        S2_KEY: ${{ secrets.S2_KEY }}
        FEISHU_APP_ID: ${{ secrets.FEISHU_APP_ID }}
        FEISHU_APP_SECRET: ${{ secrets.FEISHU_APP_SECRET }}
        FEISHU_CHAT_ID: ${{ secrets.FEISHU_CHAT_ID }}
      run: |
        python run_kimi.py

    - name: Upload results
      uses: actions/upload-artifact@v4
      with:
        name: arxiv-filter-outputs
        path: out/
        retention-days: 5
